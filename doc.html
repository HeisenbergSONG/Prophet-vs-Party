<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档 - Prophet vs Party</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 48rem;
            margin: 1.5rem auto;
            padding: 0 max(1rem, env(safe-area-inset-right)) 2rem max(1rem, env(safe-area-inset-left));
            line-height: 1.65;
            -webkit-text-size-adjust: 100%;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        a { color: #2563eb; }
        nav { margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.8; }
        #content :is(table) { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #content :is(pre) { overflow-x: auto; padding: 0.75rem; background: #f3f4f6; border-radius: 0.5rem; }
        #content :is(h1) { font-size: 1.5rem; }
        #content :is(h2) { font-size: 1.2rem; }
        #landscape-hint {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            padding: 0.65rem 1rem;
            padding-top: max(0.65rem, env(safe-area-inset-top));
            background: linear-gradient(90deg, #1e40af, #2563eb);
            color: #fff;
            font-size: 0.85rem;
            line-height: 1.45;
            text-align: center;
        }
        @media (max-width: 768px) and (orientation: portrait) {
            #landscape-hint { display: block; }
            body { padding-top: 3.25rem; }
        }
    </style>
</head>
<body>
    <div id="landscape-hint" role="status">
        📱 建议旋转手机<strong>横屏使用</strong>，阅读文档更舒适。
    </div>
    <nav>
        <a href="index.html">← 返回主页</a> ·
        <a href="doc.html?file=ETHICS.md">伦理准则</a> ·
        <a href="doc.html?file=DISCLAIMER.md">免责声明</a>
    </nav>
    <div id="content">加载中…</div>
    <script>
        const FILES = { ethics: 'ETHICS.md', disclaimer: 'DISCLAIMER.md' };
        const params = new URLSearchParams(location.search);
        let file = params.get('file');
        if (!file && params.get('doc')) {
            file = FILES[params.get('doc').toLowerCase()] || params.get('doc');
        }
        file = file || 'ETHICS.md';
        document.title = file.replace('.md', '') + ' - Prophet vs Party';
        fetch(file)
            .then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
            .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
            .catch(() => { document.getElementById('content').textContent = '文档加载失败：' + file; });
    </script>
</body>
</html>
