<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>话语之战 - Prophet vs Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .highlight { background-color: #fef3c7; padding: 2px 4px; border-radius: 9999px; font-size: 0.875rem; }
        .card { transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900">话语之战</h1>
            <p class="text-xl text-gray-600 mt-2">宣传 vs 传教 · 中立对比分析平台</p>
            <p class="text-sm text-gray-500 mt-1">Prophet vs Party</p>
        </header>

        <!-- 搜索与筛选 -->
        <div class="flex gap-4 mb-8">
            <input id="searchInput" type="text" placeholder="搜索关键词..." 
                   class="flex-1 p-3 border rounded-xl focus:outline-none focus:border-blue-500">
            <select id="typeFilter" class="p-3 border rounded-xl">
                <option value="">全部</option>
                <option value="ccp">共产党宣传</option>
                <option value="christian">基督教</option>
                <option value="islam">伊斯兰教</option>
            </select>
        </div>

        <!-- 案例展示 -->
        <div id="casesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 动态加载 -->
        </div>

        <!-- 对比区 -->
        <div id="comparison" class="hidden mt-12 bg-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-2xl font-bold mb-6 text-center">对比分析结果</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 左侧三个案例详情 -->
            </div>
            
            <!-- 雷达图 -->
            <div class="mt-10">
                <h3 class="font-semibold mb-4 text-center">修辞维度对比</h3>
                <canvas id="radarChart" height="300"></canvas>
            </div>
        </div>
    </div>

    <script>
        let allCases = [];
        let radarChartInstance = null;

        async function loadCases() {
            try {
                const response = await fetch('cases.json');
                allCases = await response.json();
                renderCases(allCases);
            } catch (e) {
                console.error("加载 cases.json 失败", e);
                alert("数据加载失败，请确保 cases.json 与 HTML 在同一目录");
            }
        }

        function renderCases(cases) {
            const grid = document.getElementById('casesGrid');
            grid.innerHTML = '';
            
            cases.forEach(caseItem => {
                const card = document.createElement('div');
                card.className = `card bg-white p-6 rounded-2xl shadow border border-gray-100`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-3 py-1 text-xs rounded-full ${caseItem.source_type === 'ccp' ? 'bg-red-100 text-red-700' : caseItem.source_type === 'christian' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">
                            ${caseItem.source_type === 'ccp' ? '共产党' : caseItem.source_type === 'christian' ? '基督教' : '伊斯兰教'}
                        </span>
                        <span class="text-xs text-gray-500">${caseItem.category}</span>
                    </div>
                    <p class="text-gray-800 font-medium leading-relaxed mb-4">"${caseItem.text}"</p>
                    <p class="text-xs text-gray-500">来源：${caseItem.source}</p>
                    <button onclick="selectForCompare('${caseItem.id}')" 
                            class="mt-4 text-sm px-5 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">
                        加入对比
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        // 简单对比功能（可扩展）
        let selectedCases = [];
        function selectForCompare(id) {
            const caseItem = allCases.find(c => c.id === id);
            if (!caseItem) return;
            
            if (selectedCases.length < 3) {
                selectedCases.push(caseItem);
                alert(`已添加：${caseItem.text.substring(0, 20)}...`);
                
                if (selectedCases.length === 3) {
                    showComparison();
                }
            }
        }

        function showComparison() {
            const compDiv = document.getElementById('comparison');
            compDiv.classList.remove('hidden');
            // 这里可以扩展完整对比逻辑
            console.log("对比案例：", selectedCases);
        }

        // 初始化
        window.onload = loadCases;
    </script>
</body>
</html>
